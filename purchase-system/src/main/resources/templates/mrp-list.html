<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MRP List</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f7fa;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
            background-color: white;
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        button {
            padding: 5px 10px;
            background-color: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0b7dda;
        }

        a {
            text-decoration: none;
            padding: 5px 10px;
            background-color: #ff9800;
            color: white;
            border-radius: 4px;
        }

        a:hover {
            background-color: #e68900;
        }
    </style>
</head>

<body>

<h2>MRP List</h2>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Order</th>
            <th>Material</th>
            <th>Required Qty</th>
            <th>Stock</th>
            <th>Shortage</th>
            <th>Status</th>
            <th>Update</th>
            <th>Generate</th>
            <th>Approve</th>
            <th>Created By</th>
            <th>Checked By</th>
            <th>Requested By</th>
            <th>Approved By</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="m : ${mrps}">

            <td th:text="${m.id}"></td>
            <td th:text="${m.orderId}"></td>
            <td th:text="${m.material.name}"></td>
            <td th:text="${m.requiredQuantity}"></td>
            <td th:text="${m.availableStock}"></td>
            <td th:text="${m.shortage}"></td>
            <td th:text="${m.status}"></td>

            <!-- UPDATE -->
            <td>
                <div th:if="${role == 'WAREHOUSE' and m.status == 'CREATED'}">
                    <form th:action="@{'/updateStock/' + ${m.id}}" method="post">
                        <input type="number" name="stock" placeholder="Enter stock"/>
                        <button type="submit">Update</button>
                    </form>
                </div>
            </td>

            <!-- GENERATE -->
            <td>
                <div th:if="${role == 'PURCHASE' and m.status == 'STOCK_CHECKED'}">
                    <a th:href="@{'/generateRequest/' + ${m.id}}">
                        Generate
                    </a>
                </div>
            </td>

            <!-- APPROVE -->
            <td>
                <div th:if="${role == 'FINANCE' and m.status == 'REQUEST_GENERATED'}">
                    <a th:href="@{'/approve/' + ${m.id} + '?approved=true'}">Approve</a>
                    |
                    <a th:href="@{'/approve/' + ${m.id} + '?approved=false'}">Reject</a>
                </div>
            </td>

            <!-- USER TRACKING -->
            <td th:text="${m.createdBy != null ? m.createdBy.name : '-'}"></td>
            <td th:text="${m.checkedBy != null ? m.checkedBy.name : '-'}"></td>
            <td th:text="${m.requestedBy != null ? m.requestedBy.name : '-'}"></td>
            <td th:text="${m.approvedBy != null ? m.approvedBy.name : '-'}"></td>

        </tr>
    </tbody>

</table>

</body>
</html>
